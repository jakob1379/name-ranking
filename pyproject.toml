[build-system]
requires = ["setuptools>=80.9.0", "wheel"]
build-backend = "setuptools.build_meta"

[dependency-groups]
dev = [
  "poethepoet>=0.39.0",
  "pyrefly>=0.46.1",
  "ruff>=0.14.10",
  "prek>=0.2.25",
  "commitizen>=4.10.1",
  "pytest>=9.0.2",
  "pytest-cov>=7.0.0",
  "pytest-playwright>=0.7.2",
  "playwright==1.56.0",
  "pytest-mock>=3.15.1",
  "pytest-xdist>=3.8.0",
  "pytest-timeout>=2.4.0",
  "ipython>=9.8.0",
  "ty>=0.0.7",
  "scalene>=2.0.1",
  "mkdocstrings-python>=2.0.1",
  "zensical>=0.0.15"
]

[project]
name = "st-name-ranking"
version = "0.1.0"
description = "Streamlit application to rank valid danish names"
readme = "README.md"
authors = [
  {name = "Jakob Stender Guldberg", email = "jakob1379@gmail.com"}
]
requires-python = ">=3.13,<3.14"
dependencies = [
  "httpx>=0.28.1",
  "ethnidata>=4.1.1",
  "numpy>=2.4.0",
  "pandas>=2.3.3",
  "rapidfuzz>=3.14.3",
  "rich>=14.2.0",
  "sentence-transformers>=5.2.0",
  "streamlit>=1.52.2",
  "typer>=0.21.0"
]

[project.scripts]
name-db = "st_name_ranking.cli:app"

[tool.commitizen]
name = "cz_conventional_commits"
tag_format = "$version"
version_scheme = "pep440"
version_provider = "uv"
update_changelog_on_bump = true
major_version_zero = true

[tool.poe.tasks]
clean = {shell = 'uvx pyclean -d=all --verbose .', help = "Clean python residuals"}
upgrade = {shell = 'uv sync --upgrade && uvx uv-bump; uvx prek autoupdate'}
htmlcov = "uv run python -m http.server -d htmlcov"
serve = "uv run streamlit run st_name_ranking/main.py"

[tool.pyrefly]
python-version = "3.13"
search-path = ["src"]

[tool.pytest.ini_options]
addopts = ["--doctest-modules", "--cov=st_name_ranking", "--cov-branch", "--cov-report=term-missing", "--cov-report=html"]
testpaths = ["tests"]

[tool.ruff]
# if this is a library, enter the _minimum_ version you
# want to support, otherwise do py313
target-version = "py313"
line-length = 80 # use whatever number makes you happy

[tool.ruff.lint]
# you can see the looong list of rules here:
# https://docs.astral.sh/ruff/rules/
# here's a couple to start with
select = [
  "A", # warn about shadowing built-ins
  "E", # style stuff, whitespaces
  "F", # important pyflakes lints
  "I", # import sorting
  "N", # naming
  "T100" # breakpoints (probably don't want these in prod!)
]

[tool.ruff.lint.isort]
# so it knows to group first-party stuff last
known-first-party = ["st_name_ranking"]

[tool.setuptools.packages.find]
where = ["."]

[tool.uv]
package = true
