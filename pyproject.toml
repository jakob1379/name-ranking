[build-system]
requires = ["setuptools>=65.0", "wheel"]
build-backend = "setuptools.build_meta"

[dependency-groups]
dev = [
  "poethepoet>=0.38.0",
  "pyrefly>=0.46.0",
  "ruff>=0.14.10",
  "prek>=0.2.24",
  "commitizen>=4.10.1"
]

[project]
name = "st-name-ranking"
version = "0.1.0"
description = "Streamlit application to rank valid danish names"
readme = "README.md"
authors = [
  {name = "Jakob Stender Guldberg", email = "jakob1379@gmail.com"}
]
requires-python = ">=3.13"
dependencies = [
  "streamlit>=1.52.2",
  "sentence-transformers>=5.2.0",
  "numpy>=2.4.0",
  "rapidfuzz>=3.14.3",
  "httpx>=0.28.1",
  "pandas>=2.3.3",
  "typer>=0.12.3",
  "rich>=13.7.0"
]

[project.scripts]
name-db = "st_name_ranking.cli:app"
init-db = "st_name_ranking.init_database:main"
classify-origins = "st_name_ranking.classify_origins:main"

[tool.commitizen]
name = "cz_conventional_commits"
tag_format = "$version"
version_scheme = "pep440"
version_provider = "uv"
update_changelog_on_bump = true
major_version_zero = true

[tool.pyrefly]
python-version = "3.13"
search-path = ["src"]

[tool.pytest.ini_options]
addopts = "--doctest-modules --numprocesses=auto --cov=src/st-name-ranking --cov-report=term-missing --cov-report=json"
testpaths = [
  "tests"
]

[tool.ruff]
# if this is a library, enter the _minimum_ version you
# want to support, otherwise do py313
target-version = "py313"
line-length = 80 # use whatever number makes you happy

[tool.ruff.lint]
# you can see the looong list of rules here:
# https://docs.astral.sh/ruff/rules/
# here's a couple to start with
select = [
  "A", # warn about shadowing built-ins
  "E", # style stuff, whitespaces
  "F", # important pyflakes lints
  "I", # import sorting
  "N", # naming
  "T100" # breakpoints (probably don't want these in prod!)
]

[tool.ruff.lint.isort]
# so it knows to group first-party stuff last
known-first-party = ["st-name-ranking"]

[tool.setuptools.packages.find]
where = ["."]

[tool.uv]
package = true
